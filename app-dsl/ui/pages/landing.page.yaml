version: 1

shell:
  id: app-shell
  title: Commerce App
  description: Shared application shell for all domain pages

  layout:
    type: shell
    structure:
      - region: sidebar
        position: left
        width: 240
        collapsible: true
        collapsedWidth: 64
        ui:
          testId: sidebar
      - region: topNav
        position: top
        height: 60
        ui:
          testId: top-nav
      - region: main
        position: center
        ui:
          testId: main-content

  navigation:
    sidebar:
      id: main-nav
      position: left
      collapsible: true
      items:
        - id: home
          label: Home
          icon: home
          to: /
          ui:
            testId: nav-home

        - id: customers
          label: Customers
          icon: users
          to: /customers
          ui:
            testId: nav-customers
          children:
            - id: customer-list
              label: Customer List
              to: /customers
              ui:
                testId: nav-customer-list

            - id: customer-create
              label: Add Customer
              to: /customers/new
              ui:
                testId: nav-customer-create

    topNav:
      id: top-nav
      position: top
      left:
        - id: app-title
          type: text
          value: Commerce App
          ui:
            testId: top-nav-title
      right:
        - id: user-greeting
          type: text
          value: "Welcome, User"
          ui:
            testId: top-nav-user

  contentSlot:
    id: main-content
    region: main
    renderChildren: true

page:
  id: landing
  route: /
  title: Commerce App
  mode: dashboard
  shell: app-shell
  renderIn: main-content

  sections:
    - id: quick-actions
      type: card-grid
      columns: 3
      gap: md
      cards:
        - id: view-customers
          title: View Customers
          description: Browse and search your customer database
          icon: users
          action:
            type: navigate
            to: /customers
          ui:
            testId: card-view-customers

        - id: add-customer
          title: Add Customer
          description: Create a new customer record
          icon: user-plus
          action:
            type: navigate
            to: /customers/new
          ui:
            testId: card-add-customer

        - id: recent-activity
          title: Recent Activity
          description: View recent customer interactions
          icon: clock
          action:
            type: navigate
            to: /activity
          ui:
            testId: card-recent-activity

    - id: stats-overview
      type: stat-cards
      columns: 4
      gap: sm
      stats:
        - id: total-customers
          label: Total Customers
          value: "{stats.totalCustomers}"
          icon: users
          trend:
            direction: up
            value: "+12%"
          ui:
            testId: stat-total-customers

        - id: new-customers
          label: New This Month
          value: "{stats.newThisMonth}"
          icon: user-plus
          trend:
            direction: up
            value: "+5%"
          ui:
            testId: stat-new-customers

        - id: active-customers
          label: Active Customers
          value: "{stats.activeCustomers}"
          icon: activity
          ui:
            testId: stat-active-customers

        - id: regions
          label: Regions
          value: "{stats.totalRegions}"
          icon: map
          ui:
            testId: stat-regions